name: Mapture CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test tests/Mapture.Tests --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Run Compatibility Tests
      run: dotnet test tests/Mapture.CompatibilityTests --no-build --configuration Release --verbosity normal

    - name: Upload Coverage
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: '**/coverage.cobertura.xml'

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Pack Mapture
      run: dotnet pack src/Mapture.Core/Mapture.Core.csproj --configuration Release --output ./nupkg

    - name: Pack Mapture.Extensions.DependencyInjection
      run: dotnet pack src/Mapture.Extensions.DependencyInjection/Mapture.Extensions.DependencyInjection.csproj --configuration Release --output ./nupkg

    - name: Pack Mapture.Compatibility
      run: dotnet pack src/Mapture.Compatibility/Mapture.Compatibility.csproj --configuration Release --output ./nupkg

    - name: Push to NuGet
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Upload NuGet Packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./nupkg/*.nupkg
