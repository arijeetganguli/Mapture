name: Mapture CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test tests/Mapture.Tests --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Run Compatibility Tests
      run: dotnet test tests/Mapture.CompatibilityTests --no-build --configuration Release --verbosity normal

    - name: Upload Coverage
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: '**/coverage.cobertura.xml'

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Pack
      run: dotnet pack src/Mapture.Core/Mapture.Core.csproj --configuration Release --output ./nupkg

    - name: Upload NuGet Package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./nupkg/*.nupkg
